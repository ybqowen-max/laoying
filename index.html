<body class="bg-stone-50 text-stone-800">

</body>
<style>
  /* 1. 悬浮球样式：浅色渐变，增加旋转感 */
  #laoying-float-ball {
    position: fixed;
    z-index: 9999;
    width: 110px;
    height: 110px;
    background: linear-gradient(135deg, #ffce67 0%, #ffab00 100%);
    border-radius: 50%;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    left: 0; top: 0;
    /* 增加一个持续的旋转效果，呼应你说的“滚动” */
    animation: ballSpin 8s linear infinite;
  }

  @keyframes ballSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  #laoying-float-ball .ball-text {
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    line-height: 1.3;
  }

  /* 2. 二维码容器：始终在球的上方 */
  #laoying-qrcode-box {
    position: absolute;
    bottom: 125%; /* 始终在球的头顶 */
    left: 50%;
    transform: translateX(-50%) scale(0);
    width: 300px;
    height: 300px;
    background-color: white;
    border: 3px solid #ffab00;
    border-radius: 15px;
    padding: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 3. 图片不裁剪：确保二维码完整 */
  #laoying-qrcode-box img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; 
    display: block;
  }

  /* 4. 悬停交互 */
  #laoying-float-ball:hover {
    background: #4caf50;
    animation-play-state: paused; /* 悬停扫码时停止旋转 */
  }

  #laoying-float-ball:hover #laoying-qrcode-box {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) scale(1);
  }
</style>

<div id="laoying-float-ball">
  <div class="ball-text">体彩<br>老鹰</div>
  <div id="laoying-qrcode-box">
    <img src="qrcode.jpg" alt="扫码关注体彩老鹰">
  </div>
</div>

<script>
  (function() {
    const ball = document.getElementById('laoying-float-ball');
    
    // 初始位置：完全随机
    let posX = Math.random() * (window.innerWidth - 110);
    let posY = Math.random() * (window.innerHeight - 110);
    
    // 初始速度：你可以根据需要微调这个数字（比如1.5会快一点，0.8会更慢更优雅）
    let vx = 1.3;
    let vy = 1.3;
    let isHovered = false;

    ball.onmouseenter = () => isHovered = true;
    ball.onmouseleave = () => isHovered = false;

    function move() {
      if (!isHovered) {
        posX += vx;
        posY += vy;

        // 左右碰撞：使用屏幕物理边缘 0 和 innerWidth
        if (posX <= 0 || posX >= window.innerWidth - 110) {
          vx *= -1;
        }
        
        // 上下碰撞：彻底放开，球可以弹到屏幕最顶端 0
        if (posY <= 0 || posY >= window.innerHeight - 110) {
          vy *= -1;
        }

        ball.style.left = posX + 'px';
        ball.style.top = posY + 'px';
      }
      requestAnimationFrame(move);
    }
    move();

    // 适配窗口大小
    window.onresize = () => {
      posX = Math.min(posX, window.innerWidth - 110);
      posY = Math.min(posY, window.innerHeight - 110);
    };
  })();
</script>
</html>
