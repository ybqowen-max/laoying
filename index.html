<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老鹰游记 - 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .banner-bg {
            background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.2)), url('banner.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800">

    <nav class="fixed w-full z-50 bg-white/70 backdrop-blur-md border-b border-stone-200">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold tracking-widest text-stone-900">老鹰游记</a>
            <div class="space-x-8 font-medium">
                <a href="shanghai.html" class="hover:text-amber-700 transition">上海</a>
                <a href="wuyishan.html" class="hover:text-amber-700 transition">武夷山</a>
            </div>
        </div>
    </nav>

    <div class="banner-bg h-screen w-full flex items-center justify-center">
        <div class="text-center text-white space-y-4">
            <h1 class="text-5xl md:text-7xl font-serif tracking-[0.2em] drop-shadow-lg">老鹰游记</h1>
            <p class="text-lg md:text-xl font-light tracking-widest opacity-90">记录山川，也记录陪我看山川的人</p>
        </div>
    </div>

    <section class="max-w-3xl mx-auto py-24 px-6 text-center">
        <h3 class="text-3xl mb-6 font-serif tracking-widest text-stone-900">序言</h3>
        <p class="leading-loose text-lg text-gray-700">
            有人说，世界是一本书，不旅行的人只读了其中一页。<br>
            这本《老鹰游记》不求惊艳世界，只为留存那些微风拂面的瞬间。<br>
            点开上方的地点，陪我重温那些走过的路。
        </p>
    </section>

    <footer class="py-12 text-center text-stone-400 text-sm border-t border-stone-100">
        <p>© 2026 老鹰游记 | 专属家人与朋友</p>
    </footer>

</body>
<style>
  /* 1. 悬浮球基础样式 */
  #laoying-float-ball {
    position: fixed;
    z-index: 9999;
    bottom: 50px;
    right: 50px;
    width: 100px;
    height: 100px;
    background-color: #ff4500;
    border-radius: 50%;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    animation: ballRotate 10s linear infinite; /* 慢速旋转动画 */
  }

  /* 定义旋转动画 */
  @keyframes ballRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* 圆球文本 */
  #laoying-float-ball .ball-text {
    color: white;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    line-height: 1.2;
    pointer-events: none;
  }

  /* 2. 核心修正：二维码容器样式 */
  #laoying-qrcode-container {
    position: absolute;
    bottom: 110%;
    right: 0;
    
    /* 💡 这里是关键：强制比例为 1:1 */
    width: 300px; /* 宽度设为 300px，你可以按需调整，长宽将保持一致 */
    height: 300px; /* 高度设为 300px，确保正方形 */
    
    background-color: white;
    border: 3px solid #ff4500;
    border-radius: 15px;
    padding: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    
    /* 初始隐藏状态 */
    opacity: 0;
    visibility: hidden;
    transform: translateY(10px);
    transition: all 0.4s ease;
  }

  /* 3. 核心修正：二维码图片样式 */
  #laoying-qrcode-container img {
    /* 💡 这里是关键：确保图片完全填充并保持比例 */
    width: 100%;       /* 填满父容器宽度 */
    height: 100%;      /* 填满父容器高度 */
    object-fit: cover; /* 如果图片比例不是1:1，自动裁剪边缘，保证容器全满且不变形 */
    border-radius: 8px; /* 给图片本身加个小圆角 */
  }

  /* 4. 悬停交互 */
  #laoying-float-ball:hover {
    background-color: #32cd32;
    animation-play-state: paused; /* 悬停时停止旋转 */
    transform: scale(1.1);
  }

  /* 鼠标悬停时平滑浮现正方形二维码 */
  #laoying-float-ball:hover #laoying-qrcode-container {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }
</style>

<div id="laoying-float-ball">
  <div class="ball-text">体彩<br>老鹰</div>
  
  <div id="laoying-qrcode-container">
    <img src="qrcode.jpg" alt="体彩老鹰二维码">
  </div>
</div>
</html>
