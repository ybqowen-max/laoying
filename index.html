<style>
  /* 1. 悬浮球样式：浅色渐变，增加旋转感 */
  #laoying-float-ball {
    position: fixed;
    z-index: 9999;
    width: 110px;
    height: 110px;
    background: linear-gradient(135deg, #ffce67 0%, #ffab00 100%);
    border-radius: 50%;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    left: 0; top: 0;
    /* 增加一个持续的旋转效果，呼应你说的“滚动” */
    animation: ballSpin 8s linear infinite;
  }

  @keyframes ballSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  #laoying-float-ball .ball-text {
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    line-height: 1.3;
  }

  /* 2. 二维码容器：始终在球的上方 */
  #laoying-qrcode-box {
    position: absolute;
    bottom: 125%; /* 始终在球的头顶 */
    left: 50%;
    transform: translateX(-50%) scale(0);
    width: 300px;
    height: 300px;
    background-color: white;
    border: 3px solid #ffab00;
    border-radius: 15px;
    padding: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 3. 图片不裁剪：确保二维码完整 */
  #laoying-qrcode-box img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; 
    display: block;
  }

  /* 4. 悬停交互 */
  #laoying-float-ball:hover {
    background: #4caf50;
    animation-play-state: paused; /* 悬停扫码时停止旋转 */
  }

  #laoying-float-ball:hover #laoying-qrcode-box {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) scale(1);
  }
</style>

<div id="laoying-float-ball">
  <div class="ball-text">体彩<br>老鹰</div>
  <div id="laoying-qrcode-box">
    <img src="qrcode.jpg" alt="扫码关注体彩老鹰">
  </div>
</div>

<script>
  (function() {
    const ball = document.getElementById('laoying-float-ball');
    
    // 初始位置：完全随机
    let posX = Math.random() * (window.innerWidth - 110);
    let posY = Math.random() * (window.innerHeight - 110);
    
    // 初始速度：你可以根据需要微调这个数字（比如1.5会快一点，0.8会更慢更优雅）
    let vx = 1.3;
    let vy = 1.3;
    let isHovered = false;

    ball.onmouseenter = () => isHovered = true;
    ball.onmouseleave = () => isHovered = false;

    function move() {
      if (!isHovered) {
        posX += vx;
        posY += vy;

        // 左右碰撞：使用屏幕物理边缘 0 和 innerWidth
        if (posX <= 0 || posX >= window.innerWidth - 110) {
          vx *= -1;
        }
        
        // 上下碰撞：彻底放开，球可以弹到屏幕最顶端 0
        if (posY <= 0 || posY >= window.innerHeight - 110) {
          vy *= -1;
        }

        ball.style.left = posX + 'px';
        ball.style.top = posY + 'px';
      }
      requestAnimationFrame(move);
    }
    move();

    // 适配窗口大小
    window.onresize = () => {
      posX = Math.min(posX, window.innerWidth - 110);
      posY = Math.min(posY, window.innerHeight - 110);
    };
  })();
</script>
    <style>
  /* 1. 顶部触发按钮：位于天气和音乐中间 */
  #egg-trigger {
    position: fixed;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10001;
    color: rgba(255, 255, 255, 0.4); /* 初始半透明，非常低调 */
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.5s ease;
    border-bottom: 1px solid transparent;
    padding-bottom: 5px;
  }
  #egg-trigger:hover {
    color: #fff;
    border-bottom: 1px solid #fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
  }

  /* 2. 遮罩层：磨砂玻璃质感 */
  #wheel-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(10px); /* 磨砂玻璃效果 */
    display: none; /* 初始隐藏 */
    justify-content: center;
    align-items: center;
    z-index: 10005;
    flex-direction: column;
  }

  /* 3. 转盘主体样式 */
  .wheel-container {
    position: relative;
    width: 400px;
    height: 400px;
    border: 8px solid #d4af37; /* 香槟金边框 */
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
    transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); /* 丝滑减速 */
  }

  /* 转盘刻度线 */
  .wheel-part {
    position: absolute;
    width: 50%;
    height: 2px;
    background: rgba(212, 175, 55, 0.3);
    top: 50%;
    left: 50%;
    transform-origin: left center;
  }

  /* 地点文字 */
  .wheel-label {
    position: absolute;
    width: 150px;
    left: 100px;
    top: -15px;
    color: #eee;
    font-size: 14px;
    text-align: right;
    padding-right: 20px;
  }

  /* 4. 指针与按钮 */
  #wheel-pointer {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-top: 30px solid #d4af37;
    z-index: 10006;
  }

  #spin-btn {
    margin-top: 50px;
    background: transparent;
    border: 1px solid #d4af37;
    color: #d4af37;
    padding: 12px 40px;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 4px;
  }
  #spin-btn:hover {
    background: #d4af37;
    color: #000;
  }

  /* 关闭按钮 */
  #close-wheel {
    position: absolute;
    top: 30px;
    right: 40px;
    color: #fff;
    font-size: 30px;
    cursor: pointer;
    opacity: 0.5;
  }
</style>

<div id="egg-trigger">—— 下次去哪里游历 ——</div>

<div id="wheel-overlay">
  <div id="close-wheel">×</div>
  <div id="wheel-pointer"></div>
  <div class="wheel-container" id="main-wheel">
    </div>
  <button id="spin-btn">开启航程</button>
</div>

<script>
  const destinations = ["北京·故宫博物院", "冰岛·雷克雅未克", "法国·巴黎", "甘肃·敦煌", "长江·游轮", "内蒙古·呼伦贝尔", "云南·彩云之南", "江苏·扬州","浙江·舟山""浙江·安吉","湖州·莫干山", "桐乡·乌镇"];
  const wheel = document.getElementById('main-wheel');
  const overlay = document.getElementById('wheel-overlay');
  const trigger = document.getElementById('egg-trigger');
  const closeBtn = document.getElementById('close-wheel');
  const spinBtn = document.getElementById('spin-btn');

  // 初始化转盘
  destinations.forEach((city, index) => {
    const angle = (360 / destinations.length) * index;
    const part = document.createElement('div');
    part.className = 'wheel-part';
    part.style.transform = `rotate(${angle}deg)`;
    part.innerHTML = `<div class="wheel-label">${city}</div>`;
    wheel.appendChild(part);
  });

  // 打开彩蛋
  trigger.onclick = () => overlay.style.display = 'flex';
  closeBtn.onclick = () => overlay.style.display = 'none';

  let currentRotation = 0;
  spinBtn.onclick = () => {
    spinBtn.disabled = true;
    spinBtn.innerText = "正在寻觅...";
    
    // 随机旋转圈数（5-10圈）+ 随机角度
    const extraDegree = Math.floor(Math.random() * 360);
    currentRotation += (360 * 8) + extraDegree;
    
    wheel.style.transform = `rotate(${currentRotation}deg)`;

    // 动画结束后处理
    setTimeout(() => {
      spinBtn.disabled = false;
      spinBtn.innerText = "再次开启";
      
      // 计算命中哪个城市
      const actualDegree = currentRotation % 360;
      const index = Math.floor((360 - actualDegree) / (360 / destinations.length)) % destinations.length;
      alert(`【老鹰游记 · 启程】\n\n星辰指引，您的下一站：${destinations[index]}`);
    }, 5100);
  };
</script>
