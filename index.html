<body class="bg-stone-50 text-stone-800">

        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

    <div class="banner-bg h-screen w-full flex items-center justify-center">

</body>
<style>
  /* 1. 悬浮球样式：颜色调浅，更有通透感 */
  #laoying-ball-container {
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    pointer-events: none; /* 容器不挡点击 */
  }

  #laoying-float-ball {
    position: absolute;
    width: 110px;
    height: 110px;
    background: linear-gradient(135deg, #ffce67 0%, #ffab00 100%); /* 调浅后的明亮橙金 */
    border-radius: 50%;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: auto; /* 球体恢复点击 */
    transition: transform 0.3s ease, background-color 0.3s ease;
    user-select: none;
  }

  #laoying-float-ball .ball-text {
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    line-height: 1.3;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
  }

  /* 2. 二维码：放大1倍（300px） */
  #laoying-qrcode {
    position: absolute;
    bottom: 120%;
    left: 50%;
    transform: translateX(-50%) scale(0.5); /* 初始缩小 */
    width: 300px; /* 放大到300px */
    height: 300px;
    background-color: white;
    border: 3px solid #ffab00;
    border-radius: 15px;
    padding: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  /* 3. 悬停交互 */
  #laoying-float-ball:hover {
    background: #4caf50; /* 悬停变绿 */
    transform: scale(1.1);
  }

  #laoying-float-ball:hover #laoying-qrcode {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) scale(1); /* 浮现并恢复大小 */
  }
</style>

<div id="laoying-ball-container">
  <div id="laoying-float-ball">
    <div class="ball-text">体彩<br>老鹰</div>
    <img id="laoying-qrcode" src="qrcode.jpg" alt="扫码关注体彩老鹰">
  </div>
</div>

<script>
  (function() {
    const ball = document.getElementById('laoying-float-ball');
    let posX = Math.random() * (window.innerWidth - 110);
    let posY = Math.random() * (window.innerHeight - 110);
    let vx = 1.5; // 水平速度（数值越小越慢）
    let vy = 1.5; // 垂直速度
    let isHovered = false;

    // 鼠标悬停时停止移动
    ball.onmouseenter = () => isHovered = true;
    ball.onmouseleave = () => isHovered = false;

    function move() {
      if (!isHovered) {
        posX += vx;
        posY += vy;

        // 碰到边界反弹
        if (posX <= 0 || posX >= window.innerWidth - 110) {
          vx *= -1;
        }
        if (posY <= 0 || posY >= window.innerHeight - 110) {
          vy *= -1;
        }

        ball.style.left = posX + 'px';
        ball.style.top = posY + 'px';
      }
      requestAnimationFrame(move);
    }

    // 监听窗口大小变化，防止球跑出去
    window.onresize = () => {
      posX = Math.min(posX, window.innerWidth - 110);
      posY = Math.min(posY, window.innerHeight - 110);
    };

    move();
  })();
</script>
</html>
