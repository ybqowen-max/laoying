<style>
  /* 1. 悬浮球样式：浅色渐变，增加旋转感 */
  #laoying-float-ball {
    position: fixed;
    z-index: 9999;
    width: 110px;
    height: 110px;
    background: linear-gradient(135deg, #ffce67 0%, #ffab00 100%);
    border-radius: 50%;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    left: 0; top: 0;
    /* 增加一个持续的旋转效果，呼应你说的“滚动” */
    animation: ballSpin 8s linear infinite;
  }

  @keyframes ballSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  #laoying-float-ball .ball-text {
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    line-height: 1.3;
  }

  /* 2. 二维码容器：始终在球的上方 */
  #laoying-qrcode-box {
    position: absolute;
    bottom: 125%; /* 始终在球的头顶 */
    left: 50%;
    transform: translateX(-50%) scale(0);
    width: 300px;
    height: 300px;
    background-color: white;
    border: 3px solid #ffab00;
    border-radius: 15px;
    padding: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 3. 图片不裁剪：确保二维码完整 */
  #laoying-qrcode-box img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; 
    display: block;
  }

  /* 4. 悬停交互 */
  #laoying-float-ball:hover {
    background: #4caf50;
    animation-play-state: paused; /* 悬停扫码时停止旋转 */
  }

  #laoying-float-ball:hover #laoying-qrcode-box {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) scale(1);
  }
</style>

<div id="laoying-float-ball">
  <div class="ball-text">体彩<br>老鹰</div>
  <div id="laoying-qrcode-box">
    <img src="qrcode.jpg" alt="扫码关注体彩老鹰">
  </div>
</div>

<script>
  (function() {
    const ball = document.getElementById('laoying-float-ball');
    
    // 初始位置：完全随机
    let posX = Math.random() * (window.innerWidth - 110);
    let posY = Math.random() * (window.innerHeight - 110);
    
    // 初始速度：你可以根据需要微调这个数字（比如1.5会快一点，0.8会更慢更优雅）
    let vx = 1.3;
    let vy = 1.3;
    let isHovered = false;

    ball.onmouseenter = () => isHovered = true;
    ball.onmouseleave = () => isHovered = false;

    function move() {
      if (!isHovered) {
        posX += vx;
        posY += vy;

        // 左右碰撞：使用屏幕物理边缘 0 和 innerWidth
        if (posX <= 0 || posX >= window.innerWidth - 110) {
          vx *= -1;
        }
        
        // 上下碰撞：彻底放开，球可以弹到屏幕最顶端 0
        if (posY <= 0 || posY >= window.innerHeight - 110) {
          vy *= -1;
        }

        ball.style.left = posX + 'px';
        ball.style.top = posY + 'px';
      }
      requestAnimationFrame(move);
    }
    move();

    // 适配窗口大小
    window.onresize = () => {
      posX = Math.min(posX, window.innerWidth - 110);
      posY = Math.min(posY, window.innerHeight - 110);
    };
  })();
</script>
  <style>
  /* 1. 顶部触发按钮 */
  #egg-trigger {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 99999; 
    color: rgba(255, 255, 255, 0.5);
    font-size: 14px;
    letter-spacing: 4px;
    cursor: pointer !important;
    transition: all 0.3s;
    user-select: none;
  }
  #egg-trigger:hover { color: #fff; text-shadow: 0 0 10px #d4af37; }

  /* 2. 遮罩层：更透亮的磨砂感 */
  #wheel-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7); /* 背景稍微调淡 */
    backdrop-filter: blur(20px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100000;
    flex-direction: column;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #wheel-overlay.show { opacity: 1; }

  /* 3. 转盘容器：淡色半透明 */
  .wheel-wrap {
    position: relative;
    width: 400px;
    height: 400px;
  }

  .wheel-container {
    position: relative;
    width: 100%;
    height: 100%;
    /* 💡 修改：淡色半透明背景 */
    background: rgba(255, 255, 255, 0.1); 
    border: 2px solid rgba(212, 175, 55, 0.5);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 7s cubic-bezier(0.15, 0, 0, 1);
    box-shadow: 0 0 50px rgba(212, 175, 55, 0.1);
  }

  /* 💡 修改：盘面中心文字 */
  .wheel-center-text {
    color: #d4af37;
    font-size: 20px;
    letter-spacing: 5px;
    font-weight: bold;
    text-align: center;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  /* 盘面装饰细线（保留一点旋转感） */
  .wheel-line {
    position: absolute;
    width: 100%; height: 1px;
    background: rgba(212, 175, 55, 0.1);
    top: 50%;
  }

  /* 4. 指针 */
  #wheel-pointer {
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-top: 30px solid #d4af37;
    z-index: 100001;
  }

  /* 5. 按钮 */
  #spin-btn {
    margin-top: 40px;
    background: transparent;
    border: 1px solid #d4af37;
    color: #d4af37;
    padding: 10px 50px;
    font-size: 16px;
    cursor: pointer;
    letter-spacing: 5px;
    transition: all 0.3s;
  }
  #spin-btn:hover:not(:disabled) { background: #d4af37; color: #000; }

  /* 💡 修改：转盘下方浮现的名言 */
  #quote-display {
    margin-top: 30px;
    color: #aaa;
    font-size: 14px;
    font-style: italic;
    max-width: 80%;
    text-align: center;
    line-height: 1.6;
    opacity: 0;
    transform: translateY(20px);
    transition: all 2s ease; /* 缓慢浮现 */
  }
  #quote-display.reveal { opacity: 1; transform: translateY(0); }

  /* 6. 结果展示卡片 */
  #result-card {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100005;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #result-card.show { opacity: 1; display: flex; }
  .result-content {
    background: #fff;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  /* 金色粒子雨容器 */
  #celebration-canvas {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100004;
  }
</style>

<div id="egg-trigger">—— 下次去哪里游历 ——</div>

<div id="wheel-overlay">
  <div id="close-wheel" style="position:absolute; top:30px; right:40px; color:#fff; font-size:40px; cursor:pointer; opacity:0.3;">×</div>
  <div class="wheel-wrap">
    <div id="wheel-pointer"></div>
    <div class="wheel-container" id="main-wheel">
      <div class="wheel-center-text">下 次 去<br>哪 里 游 历</div>
      <div class="wheel-line" style="transform: rotate(45deg)"></div>
      <div class="wheel-line" style="transform: rotate(90deg)"></div>
      <div class="wheel-line" style="transform: rotate(135deg)"></div>
    </div>
  </div>
  
  <div id="quote-display"></div>
  
  <button id="spin-btn">开启航程</button>
</div>

<canvas id="celebration-canvas"></canvas>

<div id="result-card">
  <div class="result-content">
    <div style="color:#999; font-size:12px; letter-spacing:3px; margin-bottom:15px;">DESTINATION</div>
    <div id="final-dest" style="color:#d4af37; font-size:32px; font-weight:bold; margin-bottom:30px;"></div>
    <button id="confim-btn" style="background:#d4af37; border:none; padding:10px 40px; cursor:pointer; border-radius:5px; color:#000; font-weight:bold;">启程</button>
  </div>
</div>

<script>
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    const destinations = ["北京·故宫博物院", "冰岛·雷克雅未克", "法国·巴黎", "甘肃·敦煌", "长江·游轮", "内蒙古·呼伦贝尔", "云南·彩云之南", "江苏·扬州", "浙江·舟山", "浙江·安吉", "湖州·莫干山", "桐乡·乌镇"];
    const quotes = [
      "“人的一生中，至少要有两次冲动，一次为奋不顾身的爱情，一次为说走就走的旅行。”",
      "“世界是一本书，而不旅行的人只读了其中的一页。”",
      "“真正的发现之旅不在于寻找新的风景，而在于拥有新的眼光。”",
      "“旅行是一场向外的探索，更是一次向内的回归。”"
    ];

    const wheel = document.getElementById('main-wheel');
    const overlay = document.getElementById('wheel-overlay');
    const spinBtn = document.getElementById('spin-btn');
    const quoteDisplay = document.getElementById('quote-display');
    const finalDest = document.getElementById('final-dest');
    const resultCard = document.getElementById('result-card');
    const canvas = document.getElementById('celebration-canvas');
    const ctx = canvas.getContext('2d');

    let rotation = 0;
    let spinning = false;

    // 窗口尺寸
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    // 粒子效果类
    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height - canvas.height;
        this.size = Math.random() * 5 + 2;
        this.speed = Math.random() * 3 + 2;
        this.color = `rgba(212, 175, 55, ${Math.random()})`;
      }
      update() {
        this.y += this.speed;
        if (this.y > canvas.height) this.reset();
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const particles = Array.from({ length: 50 }, () => new Particle());
    let animationId;

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      animationId = requestAnimationFrame(animateParticles);
    }

    document.getElementById('egg-trigger').onclick = () => {
      overlay.style.display = 'flex';
      setTimeout(() => overlay.classList.add('show'), 10);
    };

    document.getElementById('close-wheel').onclick = () => {
      overlay.classList.remove('show');
      setTimeout(() => overlay.style.display = 'none', 500);
      quoteDisplay.classList.remove('reveal');
      cancelAnimationFrame(animationId);
      ctx.clearRect(0,0,canvas.width, canvas.height);
    };

    spinBtn.onclick = () => {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      quoteDisplay.classList.remove('reveal');
      
      const extra = Math.floor(Math.random() * 360);
      rotation += (360 * 8) + extra;
      wheel.style.transform = `rotate(${rotation}deg)`;

      setTimeout(() => {
        // 1. 抽取结果
        const index = Math.floor(Math.random() * destinations.length);
        finalDest.innerText = destinations[index];
        quoteDisplay.innerText = quotes[Math.floor(Math.random() * quotes.length)];
        
        // 2. 需求3：开始庆祝和显示名言
        animateParticles();
        setTimeout(() => {
          quoteDisplay.classList.add('reveal');
          resultCard.style.display = 'flex';
          setTimeout(() => resultCard.classList.add('show'), 10);
        }, 1000);

        spinning = false;
        spinBtn.disabled = false;
      }, 7100);
    };

    document.getElementById('confim-btn').onclick = () => {
      resultCard.classList.remove('show');
      setTimeout(() => resultCard.style.display = 'none', 500);
    };
  });
})();
</script>
